<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Workout Generator – CoreTrack</title>
  <meta name="description" content="Generate a customized weekly workout plan using Gemini AI." />
  <link rel="stylesheet" href="/css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-logo">
        <div class="logo-icon">💪</div>
        <span>CoreTrack</span>
      </div>
      <div class="sidebar-user">
        <div class="user-avatar" id="sidebarAvatar">U</div>
        <div class="user-name" id="sidebarUserName">Loading...</div>
        <div class="user-streak" id="sidebarStreak">🔥 0 day streak</div>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-section-label">Main</div>
        <a href="dashboard.html" class="nav-link"><span class="nav-icon">📊</span> Dashboard</a>
        <a href="workouts.html" class="nav-link"><span class="nav-icon">🏋️</span> Workouts</a>
        <a href="ai.html" class="nav-link active"><span class="nav-icon">✨</span> AI Plan</a>
        <a href="nutrition.html" class="nav-link"><span class="nav-icon">🥗</span> Nutrition</a>
        <a href="goals.html" class="nav-link"><span class="nav-icon">🎯</span> Goals</a>
        <div class="nav-section-label" style="margin-top:8px">Account</div>
        <a href="profile.html" class="nav-link"><span class="nav-icon">👤</span> Profile</a>
        <a href="#" class="nav-link" data-logout><span class="nav-icon">🚪</span> Logout</a>
      </nav>
    </aside>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <div class="main-content">
      <header class="top-header">
        <div style="display:flex;align-items:center;gap:12px">
          <button class="mobile-menu-btn" id="mobileMenuBtn">☰</button>
          <h1 class="page-title">AI Workout Generator</h1>
        </div>
      </header>

      <main class="page-content">
        <!-- AI Workout Generator -->
        <div class="chart-card" style="margin-bottom:24px; border-left: 4px solid var(--primary);">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
            <h3 style="margin: 0;"><span class="chart-icon">✨</span> Generate a Custom Routine</h3>
          </div>
          <p style="color: var(--text-secondary); margin-bottom: 16px; font-size: 0.9rem;">Tell Gemini AI your fitness goals, and it will build a perfect weekly schedule for you.</p>
          
          <form id="aiWorkoutForm" style="display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap;">
            <div class="form-group" style="flex: 1; min-width: 150px; margin-bottom: 0;">
              <label for="aiGoal">Primary Goal</label>
              <select id="aiGoal" required>
                <option value="Muscle Gain">Muscle Gain</option>
                <option value="Weight Loss">Weight Loss</option>
                <option value="Endurance">Endurance</option>
                <option value="General Fitness">General Fitness</option>
              </select>
            </div>
            <div class="form-group" style="flex: 1; min-width: 150px; margin-bottom: 0;">
              <label for="aiFrequency">Days per week</label>
              <select id="aiFrequency" required>
                <option value="3">3 Days</option>
                <option value="4">4 Days</option>
                <option value="5">5 Days</option>
                <option value="6">6 Days</option>
              </select>
            </div>
            <div class="form-group" style="flex: 1; min-width: 150px; margin-bottom: 0;">
              <label for="aiLevel">Experience Level</label>
              <select id="aiLevel" required>
                <option value="Beginner">Beginner</option>
                <option value="Intermediate">Intermediate</option>
                <option value="Advanced">Advanced</option>
              </select>
            </div>
            <button type="submit" class="btn btn-primary" id="aiGenerateBtn" style="height: 42px; white-space: nowrap;">Generate Plan ✨</button>
          </form>

          <div id="aiResultContainer" style="display: none; margin-top: 24px; padding: 20px; background: var(--bg-body); border-radius: 8px; border: 1px solid var(--border-color);">
            <div id="aiPlanContent" style="line-height: 1.6;"></div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/ai.js"></script>
</body>
</html>
