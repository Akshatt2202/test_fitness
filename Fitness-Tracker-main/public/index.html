<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CoreTrack – Personal Fitness Tracker | Login</title>
  <meta name="description" content="CoreTrack is your personal fitness tracker. Log workouts, track nutrition, set goals and visualize your progress." />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-container">
      <div class="auth-card">
        <div class="auth-logo">
          <div class="logo-icon">💪</div>
          <h1>CoreTrack</h1>
          <p>Your Personal Fitness Tracker</p>
        </div>

        <div class="auth-tabs">
          <button class="auth-tab active" id="loginTab" onclick="switchTab('login')">Sign In</button>
          <button class="auth-tab" id="registerTab" onclick="switchTab('register')">Create Account</button>
        </div>

        <!-- Login Form -->
        <form class="auth-form active" id="loginForm">
          <div class="form-group">
            <label for="loginEmail">Email Address</label>
            <input type="email" id="loginEmail" placeholder="you@example.com" required />
          </div>
          <div class="form-group">
            <label for="loginPassword">Password</label>
            <input type="password" id="loginPassword" placeholder="••••••••" required />
          </div>
          <button type="submit" class="btn btn-primary btn-full btn-lg" id="loginBtn">
            Sign In
          </button>
          <p style="text-align:center;margin-top:16px;font-size:0.85rem;color:var(--text-muted)">
            Don't have an account? <a href="#" onclick="switchTab('register')" style="color:var(--primary);font-weight:600">Create one</a>
          </p>
        </form>

        <!-- Register Form -->
        <form class="auth-form" id="registerForm">
          <div class="form-group">
            <label for="regName">Full Name</label>
            <input type="text" id="regName" placeholder="John Doe" required />
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="regEmail">Email</label>
              <input type="email" id="regEmail" placeholder="you@example.com" required />
            </div>
            <div class="form-group">
              <label for="regPassword">Password</label>
              <input type="password" id="regPassword" placeholder="Min 6 chars" required minlength="6" />
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="regAge">Age</label>
              <input type="number" id="regAge" placeholder="25" min="10" max="100" required />
            </div>
            <div class="form-group">
              <label for="regGender">Gender</label>
              <select id="regGender" required>
                <option value="">Select</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
                <option value="other">Other</option>
              </select>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="regHeight">Height (cm)</label>
              <input type="number" id="regHeight" placeholder="175" min="100" max="250" required />
            </div>
            <div class="form-group">
              <label for="regWeight">Weight (kg)</label>
              <input type="number" id="regWeight" placeholder="70" min="30" max="300" required />
            </div>
          </div>
          <div class="form-group">
            <label for="regActivity">Activity Level</label>
            <select id="regActivity" required>
              <option value="sedentary">Sedentary (little or no exercise)</option>
              <option value="lightly_active">Lightly Active (1–3 days/week)</option>
              <option value="moderately_active" selected>Moderately Active (3–5 days/week)</option>
              <option value="very_active">Very Active (6–7 days/week)</option>
              <option value="extra_active">Extra Active (twice/day)</option>
            </select>
          </div>
          <button type="submit" class="btn btn-primary btn-full btn-lg" id="registerBtn">
            Create Account
          </button>
          <p style="text-align:center;margin-top:16px;font-size:0.85rem;color:var(--text-muted)">
            Already have an account? <a href="#" onclick="switchTab('login')" style="color:var(--primary);font-weight:600">Sign in</a>
          </p>
        </form>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
